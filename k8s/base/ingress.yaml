apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vs-book-app
  namespace: vs-book-app
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: vs-book-app-vs-book-app-strip-books@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /books
            pathType: Prefix
            backend:
              service:
                name: vs-book-app
                port:
                  number: 80

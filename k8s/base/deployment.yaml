apiVersion: apps/v1
kind: Deployment
metadata:
  name: vs-book-app
  namespace: vs-book-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vs-book-app
  template:
    metadata:
      labels:
        app: vs-book-app
    spec:
      containers:
        - name: app
          image: ghcr.io/mzakhar/vs-book-app@sha256:1fb0118677553019e64e96bfecfebf0d1a71e0b30c17f2c90047f9a9a69e0794
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: /data/books.db
            # Seeds the first admin only while the users table is empty;
            # rotating these values later has no effect (use the in-app admin UI).
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vs-book-app-admin
                  key: ADMIN_USERNAME
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vs-book-app-admin
                  key: ADMIN_PASSWORD
                  optional: true
            - name: GITHUB_REPO
              value: mzakhar/vs-book-app
            # In-app feedback → GitHub issues; endpoint returns 503 while unset.
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vs-book-app-github
                  key: GITHUB_TOKEN
                  optional: true
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /data
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: ghcr-creds
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vs-book-app-data

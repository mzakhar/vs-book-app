apiVersion: apps/v1
kind: Deployment
metadata:
  name: vs-book-app
  namespace: vs-book-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vs-book-app
  template:
    metadata:
      labels:
        app: vs-book-app
    spec:
      containers:
        - name: app
          image: ghcr.io/mzakhar/vs-book-app:main
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: /data/books.db
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /data
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: ghcr-creds
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vs-book-app-data

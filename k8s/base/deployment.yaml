apiVersion: apps/v1
kind: Deployment
metadata:
  name: vs-book-app
  namespace: vs-book-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vs-book-app
  template:
    metadata:
      labels:
        app: vs-book-app
    spec:
      containers:
        - name: app
          image: ghcr.io/mzakhar/vs-book-app@sha256:52c4718533cb20d6b8ebd554f504c30c29fc589945732d91b9da7181dc3eabed
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DB_PATH
              value: /data/books.db
            - name: VS_BOOK_APP_SERVICE_NAME
              value: vs-book-app
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_TRACES_SAMPLER
              value: always_on
            - name: OTEL_SEMCONV_STABILITY_OPT_IN
              value: http
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment.name=production,service.namespace=zakharhome
            # Seeds the first admin only while the users table is empty;
            # rotating these values later has no effect (use the in-app admin UI).
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vs-book-app-admin
                  key: ADMIN_USERNAME
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vs-book-app-admin
                  key: ADMIN_PASSWORD
                  optional: true
            - name: GITHUB_REPO
              value: mzakhar/vs-book-app
            # In-app feedback â†’ GitHub issues; endpoint returns 503 while unset.
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vs-book-app-github
                  key: GITHUB_TOKEN
                  optional: true
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /data
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: ghcr-creds
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vs-book-app-data

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gmail-frontend
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/mzakhar/gmail-frontend-replacement
  secretRef:
    name: gmail-frontend-github
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gmail-frontend
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: gmail-frontend
  wait: true
  timeout: 5m
